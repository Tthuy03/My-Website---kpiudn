<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đại Học Đà Nẵng – Hệ Thống Đánh Giá Thi Đua Khen Thưởng</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}

body{
  /* ===== ĐỔI ẢNH NỀN TẠI ĐÂY ===== */
  background-image: url('./Hinhanh/background.jpg');
  /* ================================= */
  background-color:#f5ede0;
  background-repeat:no-repeat;
  background-position:center center;
  background-size:100% 100%;
}

/* Lớp làm mờ nền - chỉnh opacity để tăng/giảm độ mờ (0.0=trong suốt, 1.0=trắng hoàn toàn) */
body::before{
  content:'';
  position:fixed;inset:0;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
  z-index:0;
}
.page{z-index:1;}

.page{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .35s, transform .35s;
}
.page.hidden{
  opacity:0;pointer-events:none;transform:scale(.97);
}

/* PAGE 1 */
#page1 .logo-box{
  width:160px;height:160px;
  background:#fff;
  border:1.5px solid #c0cde0;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;
}
#page1 .logo-box img{
  width:120px;height:120px;object-fit:contain;
}
#page1 .title{
  font-size:1.6rem;font-weight:700;color:#1a2a4a;
  letter-spacing:.5px;text-align:center;line-height:1.2;
}
#page1 .subtitle{
  font-size:1.6rem;font-weight:700;color:#1a2a4a;
  text-align:center;margin-top:4px;margin-bottom:40px;
}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border-radius:8px;
  font-size:1rem;font-weight:600;cursor:pointer;
  border:none;transition:opacity .15s,transform .1s;
}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-blue{background:#2563c7;color:#fff}
.btn-row{display:flex;gap:16px;align-items:center;justify-content:center}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0}

/* PAGE 2 */
#page2{background:linear-gradient(135deg,#e8f0f5 0%,#7fa8ba 100%)}
.card{
  background:#fff;border-radius:20px;
  padding:44px 48px 40px;width:min(500px,88vw);
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.12);
}
.card-title{
  font-size:1.25rem;font-weight:700;color:#111;
  letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:40px;line-height:1.3;
}
.auth-btn{
  display:block;width:100%;padding:20px 24px;border-radius:14px;
  font-size:1.1rem;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;border:none;
  transition:opacity .15s,transform .1s;margin-bottom:16px;color:#fff;
}
.auth-btn:hover{opacity:.9;transform:translateY(-1px)}
.auth-btn.ms{background:#5bc8e8}
.auth-btn.gg{background:#e85555}
.card-note{font-size:.85rem;color:#444;margin-top:16px;line-height:1.6}
.card-note b{font-weight:700}
.back-link{
  margin-top:22px;font-size:.82rem;color:rgba(255,255,255,.85);
  cursor:pointer;text-decoration:underline;background:none;border:none;
}
.back-link:hover{color:#fff}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page" id="page1">
  <div class="logo-box">
    <!-- ===== ĐỔI ẢNH LOGO TẠI ĐÂY ===== -->
    <img src="./Hinhanh/logo.png" alt="Logo ĐH Đà Nẵng"/>
    <!-- ================================= -->
  </div>
  <div class="title">ĐẠI HỌC ĐÀ NẴNG</div>
  <div class="subtitle">HỆ THỐNG ĐÁNH GIÁ THI ĐUA KHEN THƯỞNG</div>
  <div class="btn-row">
    <button class="btn btn-blue" onclick="goPage2()">
      <span class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <polyline points="3,9 7,13 15,5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      Đăng nhập đánh giá
    </button>
    <button class="btn btn-blue" onclick="goPage2()">
      <span class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="2.8" stroke="white" stroke-width="1.8"/>
          <path d="M9 1.5L9 3M9 15L9 16.5M1.5 9L3 9M15 9L16.5 9M3.7 3.7L4.8 4.8M13.2 13.2L14.3 14.3M14.3 3.7L13.2 4.8M4.8 13.2L3.7 14.3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </span>
      Đăng nhập quản lý
    </button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="page2">
  <div class="card">
    <div class="card-title">Chứng thực tập trung UDN</div>
    <button class="auth-btn ms">Microsoft</button>
    <button class="auth-btn gg">Google</button>
    <div class="card-note">
      Chọn đăng nhập bằng tài khoản mail <b>Office 365</b> (màu xanh)<br>
      hoặc tài khoản <b>Gmail</b> (màu đỏ).
    </div>
  </div>
  <button class="back-link" onclick="goBack()">← Quay lại</button>
</div>

<script>
function goPage2() {
  document.getElementById('page1').classList.add('hidden');
  document.getElementById('page2').classList.remove('hidden');
}
function goBack() {
  document.getElementById('page2').classList.add('hidden');
  document.getElementById('page1').classList.remove('hidden');
}
</script>
</body>
</html>
